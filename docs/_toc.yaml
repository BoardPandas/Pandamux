project:
  name: "PandaMUX"
  description: "Native Windows terminal multiplexer for AI agents. A Rust workspace pairing a GPU-accelerated Iced UI, an alacritty_terminal grid, local (portable-pty) and remote (russh) PTYs, a named-pipe control plane, and a pandamux CLI."
  repo_base_url: "https://github.com/BoardPandas/Pandamux/blob"
  ref_commit_hash: "3accc145c64c10d86785466dbe59b344f6100665"
  branch: "master"
  updated_at: "2026-07-17"

