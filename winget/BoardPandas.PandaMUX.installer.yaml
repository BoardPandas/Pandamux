# Winget installer manifest (issue #32).
# PandaMUX Everywhere ships as a portable zip (no code-signing → SmartScreen flags installers
# harder than zip extractions), so winget treats it as InstallerType: zip with a
# nested portable exe. This adds a `pandamux` command alias to PATH and lets users
# install/upgrade via `winget install BoardPandas.PandaMUX`.
PackageIdentifier: BoardPandas.PandaMUX
PackageVersion: 0.8.6
Platform:
  - Windows.Desktop
MinimumOSVersion: 10.0.0.0
InstallerType: zip
NestedInstallerType: portable
NestedInstallerFiles:
  - RelativeFilePath: pandamux.exe
    PortableCommandAlias: pandamux
Architecture: x64
Scope: user
UpgradeBehavior: install
ReleaseDate: 2026-06-15
Installers:
  - Architecture: x64
    InstallerUrl: https://github.com/BoardPandas/Pandamux/releases/download/v0.8.6/pandamux-0.8.6-win-x64.zip
    InstallerSha256: A5B4D244AB41CD805696D89A797E257D8A204434CEFC50D3EC8E135C897CE6EE
ManifestType: installer
ManifestVersion: 1.6.0
