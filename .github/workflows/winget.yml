# Auto-publish each PandaMUX release to the Windows Package Manager (winget).
# Issue #32: low-friction distribution channel.
#
# NOTE (Phase 7): the native app ships a signed NSIS installer (.exe), not the old
# portable zip. The regex below targets that installer. The winget-pkgs package was
# originally bootstrapped as InstallerType: zip; because the installer type changed,
# the package needs a fresh manual bootstrap PR (see winget/*.yaml, now nsis) before
# winget-releaser can auto-update it.
#
# ONE-TIME SETUP (owner):
#   1. Manually submit winget/*.yaml to https://github.com/microsoft/winget-pkgs
#      once (fork → add manifests/b/BoardPandas/PandaMUX/<version>/ → PR) to bootstrap
#      the package. `winget-releaser` only UPDATES an existing package.
#   2. Fork microsoft/winget-pkgs under your account.
#   3. Create a classic PAT with `public_repo` scope and save it as the repo
#      secret WINGET_TOKEN.
# After that, every published GitHub release auto-opens a winget-pkgs PR.
name: winget

on:
  release:
    types: [released]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    # Skip silently if the token hasn't been configured yet (no noisy failures).
    if: ${{ github.repository == 'BoardPandas/Pandamux' }}
    steps:
      - name: Publish to winget
        if: ${{ env.WINGET_TOKEN != '' }}
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: BoardPandas.PandaMUX
          installers-regex: 'PandaMUX-Setup-.*\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
