name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.5.6). Leave empty to use current package.json version.'
        required: false

permissions:
  contents: write

jobs:
  build-sign-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # pnpm BEFORE setup-node so setup-node's pnpm cache works. Version comes
      # from the packageManager field in package.json (single source of truth).
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Fix Python distutils for node-gyp
        run: pip install setuptools

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Build ──────────────────────────────────────────────
      - name: Build main + preload + CLI
        run: pnpm run build:main

      - name: Build renderer
        run: pnpm exec vite build

      # ── Package (unpacked directory, no installer) ─────────
      - name: Package with electron-builder
        run: pnpm exec electron-builder --win --dir --publish never

      - name: Extract version
        id: version
        shell: bash
        run: |
          VER=$(node -p "require('./package.json').version")
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v$VER" >> "$GITHUB_OUTPUT"
          fi

      # ── Code signing note ──────────────────────────────────
      # Signing runs AFTER the rcedit step below, not here. rcedit rewrites the
      # exe (icon + version metadata), and any modification to a binary after
      # it is signed invalidates the Authenticode signature. So signing must be
      # the last mutation of pandamux.exe before it is zipped. See the Azure
      # Trusted Signing steps after "Embed icon and version metadata".

      # ── Embed icon + metadata into exe (rcedit) ───────────
      - name: Embed icon and version metadata
        shell: bash
        run: |
          VER=$(node -p "require('./package.json').version")
          node -e "
            const { rcedit } = require('rcedit');
            rcedit('release/win-unpacked/pandamux.exe', {
              icon: 'resources/icons/icon.ico',
              'version-string': {
                ProductName: 'PandaMUX Everywhere',
                FileDescription: 'PandaMUX Everywhere',
                CompanyName: 'BoardPandas',
                InternalName: 'pandamux',
                OriginalFilename: 'pandamux.exe',
                LegalCopyright: 'Copyright (c) 2025 BoardPandas'
              },
              'file-version': process.env.VER,
              'product-version': process.env.VER
            }).then(() => console.log('rcedit done')).catch(e => { console.error(e); process.exit(1); });
          "
        env:
          VER: ${{ steps.version.outputs.version }}

      # ── Sign pandamux.exe with Azure Trusted Signing ───────
      # Credentials come from Doppler (project pandamux, config prd) via the
      # single DOPPLER_TOKEN repo secret. The pandamux-ci-signing service
      # principal (Wellforce tenant) holds the Artifact Signing Certificate
      # Profile Signer role on the SupportForge profile of the HDBtrustedsigning
      # account. Runs after rcedit so the signature stays valid.
      - name: Fetch signing secrets from Doppler
        uses: dopplerhq/secrets-fetch-action@v2.0.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          inject-env-vars: true

      - name: Sign pandamux.exe (Azure Trusted Signing)
        uses: azure/trusted-signing-action@v2.0.0
        with:
          azure-tenant-id: ${{ env.AZURE_TENANT_ID }}
          azure-client-id: ${{ env.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ env.AZURE_CLIENT_SECRET }}
          endpoint: ${{ env.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ env.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ env.AZURE_TRUSTED_SIGNING_CERT_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\release\win-unpacked
          files-folder-filter: exe
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # ── Create release zip ─────────────────────────────────
      - name: Create release zip
        shell: pwsh
        run: |
          Compress-Archive -Path "release/win-unpacked/*" `
            -DestinationPath "pandamux-${{ steps.version.outputs.version }}-win-x64.zip"

      # ── Generate latest.yml for electron-updater ──────────
      - name: Generate latest.yml
        shell: bash
        run: |
          node -e "
            const crypto = require('crypto');
            const fs = require('fs');
            const version = '${{ steps.version.outputs.version }}';
            const zip = 'pandamux-' + version + '-win-x64.zip';
            const data = fs.readFileSync(zip);
            const sha512 = crypto.createHash('sha512').update(data).digest('base64');
            const size = data.length;
            const date = new Date().toISOString();
            const yaml = [
              'version: ' + version,
              'files:',
              '  - url: ' + zip,
              '    sha512: ' + sha512,
              '    size: ' + size,
              'path: ' + zip,
              'sha512: ' + sha512,
              \"releaseDate: '\" + date + \"'\",
              ''
            ].join('\n');
            fs.writeFileSync('latest.yml', yaml);
            console.log('latest.yml generated for', zip, 'size=' + size, 'sha512=' + sha512.substring(0, 20) + '...');
          "

      - name: Upload release artifacts as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pandamux-release
          path: |
            pandamux-${{ steps.version.outputs.version }}-win-x64.zip
            latest.yml

      # ── GitHub Release ─────────────────────────────────────
      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: PandaMUX Everywhere ${{ steps.version.outputs.tag }}
          files: |
            pandamux-${{ steps.version.outputs.version }}-win-x64.zip
            latest.yml
          draft: false
          generate_release_notes: true
