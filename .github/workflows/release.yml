name: Release

# Phase 7 ship pipeline. On a `v*` tag the whole release runs here: build the
# native Rust app, Azure-sign the exe, package a single NSIS Setup.exe, sign the
# installer, and publish a GitHub Release whose ONLY asset is that installer.
# The in-app updater (pandamux-app::updater) discovers it via the Releases API,
# so there is no Velopack feed / latest.yml to generate.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.35.0). Leave empty to derive from the workspace version.'
        required: false

permissions:
  contents: write

env:
  CARGO_PACKAGER_VERSION: '0.11.8'

jobs:
  build-sign-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-packager
        run: cargo install cargo-packager --version ${{ env.CARGO_PACKAGER_VERSION }} --locked

      # ── Resolve version + tag ──────────────────────────────
      # The tag is the source of truth for the release; the workspace Cargo.toml
      # version (which cargo-packager stamps into the installer) must match it.
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            VER=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
            TAG="v$VER"
          fi
          VER="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG (version $VER)"

      # ── Build (the GUI needs the iced-runtime feature) ─────
      - name: Build CLI
        run: cargo build --release -p pandamux-cli

      - name: Build GUI app
        run: cargo build --release -p pandamux-app --features iced-runtime

      # ── Sign the binaries BEFORE packaging ─────────────────
      # cargo-packager has no before-packaging-command, so it bundles these
      # already-signed exes unchanged (the signature stays valid). Signing must
      # be the last mutation of each exe before it is packaged.
      - name: Fetch signing secrets from Doppler
        uses: dopplerhq/secrets-fetch-action@v2.0.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          inject-env-vars: true

      - name: Sign pandamux.exe + pandamux-cli.exe (Azure Trusted Signing)
        uses: azure/trusted-signing-action@v2.0.0
        with:
          azure-tenant-id: ${{ env.AZURE_TENANT_ID }}
          azure-client-id: ${{ env.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ env.AZURE_CLIENT_SECRET }}
          endpoint: ${{ env.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          signing-account-name: ${{ env.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ env.AZURE_TRUSTED_SIGNING_CERT_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\target\release
          files-folder-filter: exe
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # ── Package a single NSIS Setup.exe ────────────────────
      # cargo-packager downloads its own NSIS; no choco install needed. It reads
      # [package.metadata.packager] in crates/pandamux-app/Cargo.toml and bundles
      # the signed target/release/pandamux.exe. NOTE: cargo-packager resolves a
      # relative --out-dir against the package manifest dir (crates/pandamux-app)
      # on the runner, so pass an absolute path for a deterministic location.
      - name: Package NSIS installer
        run: cargo packager --release --formats nsis --out-dir "${{ github.workspace }}\dist"

      - name: Normalize installer name
        id: installer
        shell: pwsh
        run: |
          # Look in both the absolute out-dir and the manifest-relative dist that
          # cargo-packager may use, so we find the installer regardless.
          $candidates = @(
            "${{ github.workspace }}\dist",
            "${{ github.workspace }}\crates\pandamux-app\dist"
          )
          $setup = $candidates | Where-Object { Test-Path $_ } | ForEach-Object {
            Get-ChildItem -Path $_ -Recurse -Filter *setup*.exe -ErrorAction SilentlyContinue
          } | Select-Object -First 1
          if (-not $setup) { Write-Error 'No NSIS setup .exe produced'; exit 1 }
          $dest = Join-Path "${{ github.workspace }}\dist" ("PandaMUX-Everywhere-Setup-{0}.exe" -f "${{ steps.version.outputs.version }}")
          New-Item -ItemType Directory -Force -Path (Split-Path $dest) | Out-Null
          Move-Item -Force $setup.FullName $dest
          "path=$dest" >> $env:GITHUB_OUTPUT
          Write-Host "Installer: $dest"

      # ── Sign the installer ─────────────────────────────────
      - name: Sign installer (Azure Trusted Signing)
        uses: azure/trusted-signing-action@v2.0.0
        with:
          azure-tenant-id: ${{ env.AZURE_TENANT_ID }}
          azure-client-id: ${{ env.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ env.AZURE_CLIENT_SECRET }}
          endpoint: ${{ env.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          signing-account-name: ${{ env.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ env.AZURE_TRUSTED_SIGNING_CERT_PROFILE_NAME }}
          files: ${{ steps.installer.outputs.path }}
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pandamux-installer
          path: ${{ steps.installer.outputs.path }}

      # ── GitHub Release (installer is the ONLY asset) ───────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: PandaMUX Everywhere ${{ steps.version.outputs.tag }}
          files: ${{ steps.installer.outputs.path }}
          draft: false
          generate_release_notes: true
