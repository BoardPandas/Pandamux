name: Rust Native

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "scripts/check-rust-boundaries.ps1"
      - ".github/workflows/rust.yml"
  push:
    branches: ["master", "main"]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "scripts/check-rust-boundaries.ps1"
      - ".github/workflows/rust.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    name: Rust workspace
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check crate boundaries
        shell: pwsh
        run: .\scripts\check-rust-boundaries.ps1

      - name: Test workspace
        run: cargo test --workspace

      - name: Test Iced UI feature
        run: cargo test -p pandamux-ui --features iced-runtime --lib

      - name: Test Iced app runtime feature
        run: cargo test -p pandamux-app --features iced-runtime --bin pandamux

      - name: Smoke Iced app shell view
        run: cargo run -p pandamux-app --features iced-runtime -- --iced-shell-smoke

      - name: Build native binaries
        run: cargo build -p pandamux-app -p pandamux-cli -p pandamux-term
