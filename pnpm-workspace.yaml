# pnpm configuration (pnpm 11). In pnpm 11 these settings live here, not in
# .npmrc (which is for registry/auth only). See tasks/plan-repo.md Phase 1.

# Mandatory: a flat, symlink-free node_modules (npm/yarn-classic layout).
# node-pty's native addon resolution and the electron-builder ASAR packaging
# step both assume a hoisted tree; the default symlinked store breaks them.
nodeLinker: hoisted

# pnpm 11 blocks dependency install/build scripts by default (supply-chain
# hardening) and replaces the deprecated onlyBuiltDependencies with allowBuilds.
# Allow only the packages that must compile a native addon or fetch a platform
# binary at install time.
allowBuilds:
  node-pty: true   # native ConPTY/pty addon (node-gyp)
  electron: true   # postinstall downloads the Electron binary
  esbuild: true    # postinstall installs the esbuild binary (used by Vite)
